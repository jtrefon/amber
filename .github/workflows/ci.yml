name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cxx: [g++, clang++]
        include:
          - cxx: clang++
            lint: true
    env:
      CXX: ${{ matrix.cxx }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang libcurl4-openssl-dev \
            libncursesw5-dev pkg-config \
            clang-tidy cppcheck

      - name: Configure
        run: ./configure

      # Run static analysis before tests so lint/analyze failures fail fast
      # without burning CI minutes on test execution. clang-tidy needs the
      # clang toolchain so it runs only on the clang++ matrix leg; cppcheck
      # is compiler-agnostic.
      - name: Lint (clang-tidy)
        if: matrix.lint
        run: make lint

      - name: Static analysis (cppcheck)
        run: make analyze

      - name: Build
        run: make

      - name: Test
        run: make test
